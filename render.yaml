services:
  - type: web
    name: lumen-admin
    runtime: node
    plan: starter
    buildCommand: |
      bun install --frozen-lockfile
      npm rebuild better-sqlite3
      bun run build
    startCommand: bun run deploy:start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        value: https://lumen-admin.onrender.com
      - key: DATABASE_URL
        value: /var/data/lumen.db
    disk:
      name: lumen-data
      mountPath: /var/data
      sizeGB: 1
