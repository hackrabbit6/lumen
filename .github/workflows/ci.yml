name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Format · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node must match the version better-sqlite3 (a native addon) is built
      # against, since `next build` evaluates server modules that load it.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Rebuild the native addon against the Node above so its ABI matches the
      # runtime that runs `next build`.
      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build
        env:
          # Build only needs the var to exist; no real secret is used at build time.
          BETTER_AUTH_SECRET: ci-placeholder-secret-not-used-in-prod-0000
